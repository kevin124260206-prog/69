<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>施柏謙影音系統 - 頂級防禦版</title>
    
    <style>
        /* =========================================
           全域與排版樣式
           ========================================= */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none; 
            overflow-x: hidden; 
        }
        
        /* 開場流體動畫 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; transition: opacity 0.6s ease-out;
        }
        
        .morph-shape {
            background: linear-gradient(90deg, #ff4500, #ff8c00, #ff0000);
            background-size: 200% 200%;
            animation: 
                morph-sequence 3.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards,
                gradient-sweep 2s linear infinite;
        }

        @keyframes morph-sequence {
            0% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform: rotate(0deg); width: 80px; height: 80px; }
            30% { clip-path: circle(50% at 50% 50%); transform: rotate(360deg); width: 80px; height: 80px; }
            60% { width: 80px; height: 80px; border-radius: 50%; clip-path: none; }
            100% { width: 320px; height: 4px; border-radius: 2px; transform: rotate(360deg); clip-path: none; }
        }

        .brand-text {
            position: absolute; margin-top: -30px; font-size: 28px; letter-spacing: 8px; font-weight: bold;
            background: linear-gradient(90deg, #fff, #aaa); -webkit-background-clip: text; color: transparent;
            opacity: 0; 
            animation: text-appear 1s ease-out 2.5s forwards;
        }

        @keyframes text-appear { to { opacity: 1; margin-top: -45px; } }
        @keyframes gradient-sweep { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* 左上角按鈕 (電腦版懸浮) */
        .top-left-logo {
            position: fixed; 
            top: 20px; 
            left: 20px; 
            cursor: pointer; 
            z-index: 15000;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        
        .logo-color-bar { 
            display: flex; align-items: center; justify-content: center; width: 140px; height: 34px; 
            background: linear-gradient(90deg, #ff4500, #ff8c00, #ff0000); border-radius: 17px; 
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.6); transition: all 0.3s;
        }

        .logo-text { color: #ffffff; font-size: 14px; font-weight: 900; letter-spacing: 1.5px; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5); }
        .top-left-logo:hover .logo-color-bar { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 140, 0, 0.9); }

        /* 首頁佈局 */
        #app { padding: 40px 15px; max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin: 40px 0 20px 0; transition: all 0.4s; opacity: 1; max-height: 100px; overflow: hidden; }
        header h1 { font-size: 28px; letter-spacing: 3px; margin: 0; color: #fff; font-weight: bold; }
        
        .search-bar { text-align: center; margin-bottom: 30px; transition: all 0.4s; opacity: 1; max-height: 100px; overflow: hidden; }
        .search-bar input { padding: 12px 20px; width: 85%; max-width: 500px; border-radius: 30px; border: none; background: #1e1e1e; color: #fff; font-size: 15px; outline: none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); transition: all 0.3s; text-align: center; }
        .search-bar input:focus { background: #252525; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 12px rgba(255, 69, 0, 0.3); }
        #loading-status { text-align: center; color: #888; margin-bottom: 30px; font-size: 15px; }

        body.playing-mode header, body.playing-mode .search-bar { opacity: 0; max-height: 0; margin: 0; padding: 0; pointer-events: none; }

        /* 影片清單網格 */
        .main-layout { display: flex; flex-direction: column; gap: 25px; width: 100%; }
        .left-column { width: 100%; display: block; }
        .right-column { width: 100%; display: block; }

        .video-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); width: 100%; }
        .video-card { background: #151515; border-radius: 12px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.2s, background 0.2s; }
        .video-card:hover { transform: translateY(-5px); background: #1d1d1d; }
        .thumbnail-container { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; position: relative; overflow: hidden; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-info { padding: 12px; display: flex; flex-direction: column; justify-content: space-between; flex: 1; }
        .video-title { margin: 0 0 6px 0; font-size: 14px; line-height: 1.4; font-weight: bold; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #fff; }
        .video-date { margin: 0; font-size: 12px; color: #777; }
        
        /* =========================================
           📱 影片播放器核心修復區
           ========================================= */
        #player-area { display: none; margin-bottom: 20px; width: 100%; }

        .video-stage { 
            position: relative; 
            display: block; /* 確保盒模型生效 */
            width: 100%; 
            height: 0;
            padding-bottom: 56.25%; /* 完美的 16:9 */
            background: #000; 
            overflow: hidden; 
            border-radius: 12px; 
            border: 1px solid #222;
        }
        
        .video-stage iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
            z-index: 1; 
        }
        
        /* 🛡️ 暴力加高防跳出蓋板 */
        .video-secure-bar { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            /* 提高到 90px，徹底蓋住所有高解析度手機的按鈕 */
            height: 90px; 
            z-index: 999; /* 超高層級，防阻一切點擊 */
            background: transparent; 
            pointer-events: auto; 
        }

        .playing-info { padding: 16px 4px; border-bottom: 1px solid #222; }
        .playing-title { font-size: 18px; font-weight: bold; margin: 0 0 8px 0; color: #fff; line-height: 1.4; }
        .playing-meta { font-size: 13px; color: #aaa; }
        .grid-header { font-size: 18px; font-weight: bold; margin: 15px 0; color: #aaa; }
        footer { text-align: center; margin-top: 60px; padding: 24px; color: #444; font-size: 13px; border-top: 1px solid #111; }
        
        #defense-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: red; z-index: 999999; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; }

        /* =========================================
           📱 手機版專屬暴力優化 (終極不重疊方案)
           ========================================= */
        @media (max-width: 768px) {
            /* 徹底拔除懸浮定位，讓它變成普通文件流的一部份 */
            .top-left-logo {
                position: relative; /* 改為相對定位 */
                top: 0;
                left: 0;
                display: flex;
                justify-content: center;
                width: 100%;
                padding-top: 20px;
                margin-bottom: -10px; /* 微調與下方標題的距離 */
            }
            .logo-color-bar {
                margin: 0 auto; /* 強制按鈕置中 */
            }
            #app {
                padding-top: 20px; /* 移除過多的上方空白 */
            }
            header {
                margin-top: 10px; 
            }
            .playing-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div id="defense-overlay">系統安全機制已觸發，請關閉開發者工具。</div>

    <div id="splash">
        <div class="brand-text">施柏謙電影</div>
        <div class="morph-shape"></div>
    </div>

    <div class="top-left-logo" onclick="resetView()" title="回到首頁">
        <div class="logo-color-bar">
            <span class="logo-text">施柏謙電影</span>
        </div>
    </div>

    <div id="app">
        <header id="mainHeader">
            <h1>施柏謙影音系統</h1>
        </header>

        <div class="search-bar" id="searchBarArea">
            <input type="text" id="searchInput" placeholder="搜尋影片名稱..." onkeyup="filterVideos()">
        </div>
        
        <div id="loading-status">正在安全載入影音資料，請稍候...</div>

        <div class="main-layout" id="mainLayout">
            <div class="left-column">
                <div id="player-area">
                    <div class="video-stage" id="stage-container"></div>
                    <div class="playing-info">
                        <h2 class="playing-title" id="currentVideoTitle">影片載入中...</h2>
                        <div class="playing-meta" id="currentVideoDate"></div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <h3 class="grid-header" id="listHeader">所有影片</h3>
                <div class="video-grid" id="videoGrid"></div>
            </div>
        </div>
        
        <footer><p id="copyright"></p></footer>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyIJd-CE6i_4pOL03QKTfIkMkJgEVJOnQrjVunW6HV1fgMUkjUL5xLf-7b8ZZFp-l45/exec';
        
        let allVideosData = [];
        let isDataLoaded = false;
        let isAnimationFinished = false;

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
               (e.ctrlKey && ['u', 's', 'p'].includes(e.key.toLowerCase()))) {
                e.preventDefault();
                return false;
            }
        });

        setInterval(() => {
            const before = new Date().getTime();
            (function() { debugger; })();
            const after = new Date().getTime();
            if (after - before > 100) {
                document.getElementById('defense-overlay').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        }, 1000);

        window.onload = () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('copyright').innerText = `© 2025 - ${currentYear} 施柏謙 版權所有 | 核心軍規防護中`;

            setTimeout(() => {
                isAnimationFinished = true;
                checkAndHideSplash();
            }, 4000);

            fetchVideos();
        };

        function checkAndHideSplash() {
            if (isDataLoaded && isAnimationFinished) {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 600);
            }
        }

        async function fetchVideos() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                if (data && data.length > 0) {
                    allVideosData = data;
                    document.getElementById('loading-status').style.display = 'none'; 
                    renderGrid();
                } else {
                    document.getElementById('loading-status').innerText = '暫無可用影片。';
                }
            } catch(err) { 
                document.getElementById('loading-status').innerText = '安全連線逾時，請重試。'; 
            } finally {
                isDataLoaded = true;
                checkAndHideSplash();
            }
        }

        function renderGrid(currentPlayingToken = null) {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ''; 

            let filtered = allVideosData.filter(v => v.name.toLowerCase().includes(keyword));
            
            if (currentPlayingToken) {
                filtered = filtered.filter(v => v.secureToken !== currentPlayingToken);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #555; padding: 40px;">無符合篩選條件的影片</div>';
                return;
            }

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.secureToken, video.name, video.date); 
                const thumbSrc = video.thumbnail ? video.thumbnail : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
                card.innerHTML = `
                    <div class="thumbnail-container"><img src="${thumbSrc}" class="thumbnail" alt="預覽圖" loading="lazy"></div>
                    <div class="video-info"><h4 class="video-title">${video.name}</h4><p class="video-date">${video.date}</p></div>
                `;
                grid.appendChild(card);
            });
        }

        function filterVideos() {
            const stageContainer = document.getElementById('stage-container');
            const isPlaying = document.getElementById('mainLayout').classList.contains('playing');
            const currentToken = isPlaying ? stageContainer.getAttribute('data-playing-token') : null;
            renderGrid(currentToken);
        }

        function decryptToken(secureToken) {
            try {
                let chars = secureToken.split('');
                for (let i = 0; i < chars.length; i++) {
                    chars[i] = String.fromCharCode(chars[i].charCodeAt(0) - 1);
                }
                let base64Str = chars.join('');
                return atob(base64Str);
            } catch (err) {
                console.error("解密失敗", err);
                return null;
            }
        }

        function playVideo(token, title, date) {
            const mainLayout = document.getElementById('mainLayout');
            const playerArea = document.getElementById('player-area');
            const stageContainer = document.getElementById('stage-container');
            const currentTitle = document.getElementById('currentVideoTitle');
            const currentDate = document.getElementById('currentVideoDate');
            const listHeader = document.getElementById('listHeader');

            try {
                const fileId = decryptToken(token); 
                if (!fileId) {
                    alert("解密失敗，檔案異常。");
                    return;
                }
                stageContainer.setAttribute('data-playing-token', token);

                stageContainer.innerHTML = `
                    <div class="video-secure-bar"></div>
                    <iframe 
                        id="videoIframe"
                        src="https://drive.google.com/file/d/${fileId}/preview" 
                        allow="autoplay; fullscreen" 
                        allowfullscreen="true">
                    </iframe>`;

                currentTitle.innerText = title;
                currentDate.innerText = `發布日期：${date}`;

                playerArea.style.display = 'block';
                mainLayout.classList.add('playing');
                listHeader.innerText = '推薦影片';
                
                document.body.classList.add('playing-mode');

                renderGrid(token);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                alert("存取失敗：影片 ID 讀取異常。");
                console.error(e);
            }
        }

        function resetView() {
            const mainLayout = document.getElementById('mainLayout');
            const playerArea = document.getElementById('player-area');
            const stageContainer = document.getElementById('stage-container');
            const listHeader = document.getElementById('listHeader');
            
            document.body.classList.remove('playing-mode');

            playerArea.style.display = 'none';
            stageContainer.innerHTML = ''; 
            stageContainer.removeAttribute('data-playing-token');
            mainLayout.classList.remove('playing');
            listHeader.innerText = '所有影片';
            
            document.getElementById('searchInput').value = '';
            renderGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
