<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施柏謙影音系統</title>
    
    <style>
        /* =========================================
           基礎劇院級樣式與防護
           ========================================= */
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #121212; color: #fff; user-select: none; overflow-x: hidden; font-size: 18px; }
        
        /* =========================================
           1. 開場流體動畫 (5秒)
           ========================================= */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; transition: opacity 0.5s ease-out;
        }
        
        .morph-shape {
            background: linear-gradient(90deg, #ff4500, #ff8c00, #4169e1);
            background-size: 200% 200%;
            animation: 
                morph-sequence 5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards,
                gradient-sweep 2s linear infinite;
        }

        @keyframes morph-sequence {
            0% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform: rotate(0deg); width: 80px; height: 80px; }
            15% { transform: rotate(180deg); }
            40% { clip-path: circle(50% at 50% 50%); transform: rotate(1440deg); width: 80px; height: 80px; }
            60% { width: 80px; height: 80px; border-radius: 50%; }
            100% { width: 400px; height: 4px; clip-path: none; border-radius: 2px; transform: rotate(1440deg); }
        }

        .brand-text {
            position: absolute; margin-top: -30px; font-size: 32px; letter-spacing: 10px; font-weight: bold;
            background: linear-gradient(90deg, #fff, #ccc); -webkit-background-clip: text; color: transparent;
            opacity: 0; animation: text-appear 1s ease-out 4s forwards;
        }

        @keyframes text-appear { to { opacity: 1; margin-top: -45px; } }
        @keyframes gradient-sweep { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* =========================================
           2. 主畫面與影音網格
           ========================================= */
        #app { display: none; padding: 30px; max-width: 1600px; margin: 0 auto; }
        
        header { text-align: center; margin: 20px 0 40px 0; cursor: pointer; transition: opacity 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        header:hover { opacity: 0.8; }
        .logo-circle {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; color: white;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
            transition: transform 0.3s;
        }
        header:hover .logo-circle { transform: scale(1.1) rotate(10deg); }
        header h2 { font-size: 36px; letter-spacing: 2px; margin: 0; }
        
        .search-bar { text-align: center; margin-bottom: 20px; }
        .search-bar input { padding: 18px 30px; width: 80%; max-width: 700px; border-radius: 50px; border: none; background: #222; color: #fff; font-size: 18px; outline: none; box-shadow: inset 0 2px 8px rgba(0,0,0,0.6); transition: box-shadow 0.3s; }
        .search-bar input:focus { box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 15px rgba(255, 69, 0, 0.5); }
        
        #loading-status { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 16px; letter-spacing: 1px; }

        .video-container { display: grid; gap: 40px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .video-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .video-container { grid-template-columns: repeat(3, 1fr); } }

        .video-card { background: #1a1a1a; border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .video-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        
        .thumbnail { width: 100%; height: 280px; object-fit: cover; background: #000; display: block; transition: opacity 0.3s; }
        .video-card:hover .thumbnail { opacity: 0.6; }
        
        .video-info { padding: 20px; }
        .video-title { margin: 0 0 12px 0; font-size: 22px; line-height: 1.4; font-weight: bold; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #fff; }
        
        .card-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: all 0.3s ease;
        }
        .card-play-btn::after { content: ''; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 18px solid #111; margin-left: 5px; }
        .video-card:hover .card-play-btn {
            opacity: 1;
            background: linear-gradient(90deg, #ff4500, #ff8c00, #4169e1);
            background-size: 200% 200%;
            animation: gradient-sweep 1.5s linear infinite; 
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* =========================================
           3. 播放器模態框與「安全防護遮罩層」
           ========================================= */
        #player-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.98); z-index: 20000; 
            justify-content: center; align-items: center; backdrop-filter: blur(8px); 
        }
        
        /* 播放視窗容器 */
        .player-wrapper { 
            position: relative; 
            width: 90%; 
            max-width: 1100px; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); 
        }
        
        /* 當我們自訂全螢幕時，強制使播放視窗放大至 100% 滿版 */
        .player-wrapper:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            border-radius: 0 !important;
        }
        
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background-color: #000; }
        
        /* 如果進入全螢幕狀態，容器高度需自動填滿 */
        .player-wrapper:fullscreen .iframe-container {
            padding-bottom: 0;
            height: 100vh;
        }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 【核心安全防護層】覆蓋於整個 iframe 最上層，但不攔截點擊操作，唯獨遮蔽特定區域 */
        .player-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 讓滑鼠點擊直接穿透，不會干擾影片播放與進度條調整 */
            z-index: 100;
        }

        /* 右上角物理遮罩（不允許滑鼠穿透點擊，徹底封鎖外連按鈕） */
        .video-shield-topright {
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px; /* 加寬防護面積 */
            background: transparent;
            pointer-events: auto; /* 恢復滑鼠阻擋，使用者在此區域內無法點到 iframe 內部的外連鈕 */
            cursor: default;
        }

        /* 【雙重狀態浮水印】非全螢幕與自訂全螢幕時皆完美浮貼，支援穿透點擊 */
        .watermark { 
            position: absolute; 
            bottom: 30px; right: 40px; 
            color: rgba(255, 255, 255, 0.3); 
            font-size: 24px; font-weight: bold; 
            letter-spacing: 4px; 
            pointer-events: none; /* 允許點擊穿透 */
            z-index: 101; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); 
        }
        
        /* =========================================
           4. 右上角「自訂安全控制控制列」（全域置頂）
           ========================================= */
        .control-group {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
            z-index: 999999; /* 極高層級，防止被任何物件覆蓋 */
        }

        .custom-control-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
            user-select: none;
        }

        /* 關閉返回鍵 */
        .close-global-btn { background: rgba(255, 69, 0, 0.9); }
        .close-global-btn:hover { transform: scale(1.1); background: #ff6347; }

        /* 安全全螢幕鍵 */
        .fullscreen-global-btn { background: rgba(65, 105, 225, 0.9); font-size: 20px; }
        .fullscreen-global-btn:hover { transform: scale(1.1); background: #5c7eff; }
        
        footer { text-align: center; margin-top: 60px; padding: 20px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 5秒開場動畫 -->
    <div id="splash">
        <div class="brand-text">施柏謙影音</div>
        <div class="morph-shape"></div>
    </div>

    <!-- 網站主介面 -->
    <div id="app">
        <!-- 點擊 Logo 可重置回到首頁 -->
        <header onclick="resetView()" title="返回首頁">
            <div class="logo-circle">施</div>
            <h2>施柏謙影音系統</h2>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜尋影片名稱..." onkeyup="filterVideos()">
        </div>
        
        <div id="loading-status">正在安全載入影音資料，請稍候...</div>
        
        <div class="video-container" id="videoGrid"></div>
        
        <footer><p id="copyright"></p></footer>
    </div>

    <!-- 劇院播放器模態框 -->
    <div id="player-modal">
        
        <!-- 【自訂全域安全控制列】 -->
        <div class="control-group">
            <!-- 安全全螢幕按鈕 -->
            <div id="fs-btn" class="custom-control-btn fullscreen-global-btn" onclick="toggleSecureFullscreen()" title="安全全螢幕 (F)">⛶</div>
            <!-- 關閉按鈕 -->
            <div class="custom-control-btn close-global-btn" onclick="closePlayer()" title="關閉返回 (ESC)">×</div>
        </div>
        
        <!-- 播放器主包裝器 -->
        <div class="player-wrapper" id="secure-wrapper">
            <!-- 播放器容器 (動態注入與銷毀) -->
            <div class="iframe-container" id="iframe-box"></div>
            
            <!-- 【防外連＋全螢幕雙重安全覆蓋層】 -->
            <div class="player-overlay">
                <div class="video-shield-topright"></div>
                <div class="watermark">施柏謙影音</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 必填區：請將下方的網址換成你最新部署的 GAS URL
        // ==========================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzR9uAV3jA2ViwOM7MBNZH0oDPGNiR8vKm_uD8KE45xWY3ODhJ-HtxkYtJKciKS8q0L/exec';
        
        let allVideosData = [];

        window.onload = () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('copyright').innerText = `© 2025 - ${currentYear} 施柏謙 版權所有 | 系統受Google保護`;

            // 執行 5 秒開場動畫
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }, 500);
            }, 5000);

            // 在背景抓取影片資料
            fetchVideos();
        };

        // 安全防護：禁止網頁點擊右鍵、禁止按 F12 與各種開發者快捷鍵
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && ['s', 'u', 'c', 'i', 'j'].includes(e.key.toLowerCase()))) {
                e.preventDefault();
            }
            // ESC 鍵關閉播放器
            if (e.key === 'Escape') {
                closePlayer();
            }
            // F 鍵切換安全全螢幕
            if (e.key.toLowerCase() === 'f' && document.getElementById('player-modal').style.display === 'flex') {
                toggleSecureFullscreen();
            }
        });

        // 監聽全螢幕變化事件，更新按鈕圖示
        document.addEventListener('fullscreenchange', () => {
            const fsBtn = document.getElementById('fs-btn');
            if (document.fullscreenElement) {
                fsBtn.innerText = '❐';
                fsBtn.title = '退出全螢幕 (F)';
            } else {
                fsBtn.innerText = '⛶';
                fsBtn.title = '安全全螢幕 (F)';
            }
        });

        // 呼叫 GAS API 讀取影片清單
        async function fetchVideos() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                if (data.error) {
                    document.getElementById('loading-status').innerText = data.error;
                    return;
                }

                if (data && data.length > 0) {
                    allVideosData = data;
                    document.getElementById('loading-status').style.display = 'none'; 
                    filterVideos();
                } else {
                    document.getElementById('loading-status').innerText = '試算表內的資料夾目前無任何影片。';
                }
            } catch(err) { 
                console.error("讀取失敗:", err);
                document.getElementById('loading-status').innerText = '載入失敗，請確認 GAS 網址是否正確。'; 
            }
        }

        // 搜尋過濾與渲染影片卡片
        function filterVideos() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ''; 

            const filtered = allVideosData.filter(v => v.name.toLowerCase().includes(keyword));

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #777; padding: 40px; font-size: 20px;">找不到符合的影片</div>';
                return;
            }

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openPlayer(video.secureToken); 
                
                const thumbSrc = video.thumbnail ? video.thumbnail : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

                card.innerHTML = `
                    <div style="position: relative;">
                        <img src="${thumbSrc}" class="thumbnail" alt="預覽圖" loading="lazy">
                        <div class="card-play-btn"></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.name}</h3>
                        <p style="margin:0; font-size: 14px; color: #888;">${video.date}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 開啟播放器：記憶體動態解密
        function openPlayer(secureToken) {
            const modal = document.getElementById('player-modal');
            const iframeBox = document.getElementById('iframe-box');
            
            try {
                const fileId = atob(secureToken);
                
                // 【核心防護更新】
                // 1. 移除 allowfullscreen（閹割 Google 的原生全螢幕，防止防護層破裂）
                // 2. 引入 sandbox（禁止彈出視窗：不給 allow-popups，使外連按鈕點擊時完全失效）
                iframeBox.innerHTML = `
                    <iframe 
                        id="video-iframe"
                        src="https://drive.google.com/file/d/${fileId}/preview" 
                        allow="autoplay" 
                        sandbox="allow-scripts allow-same-origin allow-forms">
                    </iframe>`;
                
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden'; 
            } catch (err) {
                alert("播放初始化失敗，請重新載入網頁。");
            }
        }

        // 切換安全全螢幕（將「影片+浮水印+遮罩」打包一起送入全螢幕，完美保留防護）
        function toggleSecureFullscreen() {
            const wrapper = document.getElementById('secure-wrapper');
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) { /* Safari */
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.msRequestFullscreen) { /* IE11 */
                    wrapper.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 徹底關閉播放器並退出全螢幕
        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const iframeBox = document.getElementById('iframe-box');
            
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
            
            modal.style.display = 'none';
            iframeBox.innerHTML = ''; 
            document.body.style.overflow = 'auto'; 
        }

        // 點擊上方 LOGO 重置頁面
        function resetView() {
            closePlayer();
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            filterVideos();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
