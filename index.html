<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施柏謙影音</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        /* 基礎防護與劇院級樣式 */
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #121212; color: #fff; user-select: none; overflow-x: hidden; font-size: 18px; }
        
        /* =========================================
           1. 施柏謙影音：流體啟動系統 (5秒開場)
           ========================================= */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease-out;
        }
        
        /* 幾何變形核心 (三角形慢到快 -> 圓形 -> 拉伸) */
        .morph-shape {
            background: linear-gradient(90deg, #ff4500, #ff8c00, #4169e1);
            background-size: 200% 200%;
            animation: 
                morph-sequence 5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards,
                gradient-sweep 2s linear infinite; /* 反光滾動感 */
        }

        @keyframes morph-sequence {
            /* 0-2秒：慢速起步，隨後暴衝高速旋轉並轉為圓形 */
            0% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform: rotate(0deg); width: 80px; height: 80px; }
            15% { transform: rotate(180deg); }
            40% { clip-path: circle(50% at 50% 50%); transform: rotate(1440deg); width: 80px; height: 80px; }
            
            /* 2-3.5秒：穩固圓形準備變形 */
            60% { width: 80px; height: 80px; border-radius: 50%; }
            
            /* 3.5-5秒：瞬間拉伸成線條 */
            100% { width: 400px; height: 4px; clip-path: none; border-radius: 2px; transform: rotate(1440deg); }
        }

        /* 品牌字體浮現 */
        .brand-text {
            position: absolute; margin-top: -30px; font-size: 32px; letter-spacing: 10px; font-weight: bold;
            background: linear-gradient(90deg, #fff, #ccc); -webkit-background-clip: text; color: transparent;
            opacity: 0; animation: text-appear 1s ease-out 4s forwards;
        }

        @keyframes text-appear { to { opacity: 1; margin-top: -45px; } }
        @keyframes gradient-sweep { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* =========================================
           2. 系統主畫面與劇院級網格佈局
           ========================================= */
        #app { display: none; padding: 30px; max-width: 1600px; margin: 0 auto; }
        header { text-align: center; margin: 20px 0 40px 0; }
        header h2 { font-size: 36px; letter-spacing: 2px; }
        .search-bar { text-align: center; margin-bottom: 50px; }
        .search-bar input { padding: 18px 30px; width: 80%; max-width: 700px; border-radius: 50px; border: none; background: #222; color: #fff; font-size: 18px; outline: none; box-shadow: inset 0 2px 8px rgba(0,0,0,0.6); }
        
        .video-container { display: grid; gap: 40px; grid-template-columns: 1fr; }
        /* 電腦版改為 3 欄大圖模式 */
        @media (min-width: 1024px) { .video-container { grid-template-columns: repeat(3, 1fr); } }

        .video-card { background: #1a1a1a; border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .video-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .thumbnail { width: 100%; height: 280px; object-fit: cover; background: #000; display: block; }
        
        .video-info { padding: 20px; }
        .video-title { margin: 0 0 12px 0; font-size: 24px; line-height: 1.5; font-weight: bold; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #fff; }
        
        /* 影片卡片上的自訂播放按鈕 (彩色流動光暈) */
        .card-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: all 0.3s ease;
        }
        .card-play-btn::after {
            content: ''; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 18px solid #111; margin-left: 5px;
        }
        .video-card:hover .card-play-btn {
            opacity: 1;
            background: linear-gradient(90deg, #ff4500, #ff8c00, #4169e1);
            background-size: 200% 200%;
            animation: gradient-sweep 1.5s linear infinite; 
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* =========================================
           3. 播放器模態框與防盜浮水印
           ========================================= */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; }
        .player-wrapper { position: relative; width: 95%; max-width: 1200px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .close-btn { position: absolute; top: -45px; right: 0; color: #fff; font-size: 40px; cursor: pointer; z-index: 101; font-weight: bold; }
        
        /* 角落跟隨浮水印 */
        .watermark { position: absolute; bottom: 70px; right: 25px; color: rgba(255,255,255,0.3); font-size: 20px; font-weight: bold; letter-spacing: 3px; pointer-events: none; z-index: 99; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }
        
        /* 覆寫 Plyr 播放器主題色為品牌橘紅 */
        :root { --plyr-color-main: #ff4500; }
        footer { text-align: center; margin-top: 60px; padding: 20px; color: #777; font-size: 15px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="brand-text">施柏謙影音</div>
        <div class="morph-shape"></div>
    </div>

    <div id="app">
        <header><h2>施柏謙影音系統</h2></header>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜尋影片名稱..." onkeyup="filterVideos()">
        </div>
        <div class="video-container" id="videoGrid"></div>
        <footer><p id="copyright"></p></footer>
    </div>

    <div id="player-modal">
        <div class="player-wrapper">
            <div style="position: relative;">
                <span class="close-btn" onclick="closePlayer()">×</span>
            </div>
            <video id="plyr-player" playsinline controls style="width: 100%;"></video>
            <div class="watermark">施柏謙影音</div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // ★★★ 請替換為你建立「新版本」後的 GAS 網址 ★★★
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxZecjxCeE4sUKf9lqJwDKG5Kupn3fGpIgLjZwIClGb3RHA3WndJgE6gqq5jh-vfKRH/exec';
        
        let allVideosData = [];
        let playerInstance;

        window.onload = () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('copyright').innerText = `© 2025 - ${currentYear} 施柏謙 版權所有`;

            // 5秒開場動畫邏輯
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }, 500);
            }, 5000);

            // 初始化 Plyr 播放器
            playerInstance = new Plyr('#plyr-player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                keyboard: { focused: false, global: false } 
            });

            // 啟動資料擷取與 5 秒輪詢
            fetchVideos();
            setInterval(fetchVideos, 5000);
        };

        // 防護設定：禁用右鍵與快捷鍵
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && ['s', 'u', 'c'].includes(e.key.toLowerCase()))) e.preventDefault();
        });

        // 讀取 API
        async function fetchVideos() {
            if(!GAS_URL.startsWith('http')) return; 
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                if(JSON.stringify(data) !== JSON.stringify(allVideosData)) {
                    allVideosData = data;
                    filterVideos();
                }
            } catch(err) { console.log("同步檢查中..."); }
        }

        // 搜尋與渲染
        function filterVideos() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ''; 

            const filtered = allVideosData.filter(v => v.name.toLowerCase().includes(keyword));

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openPlayer(video.id);
                
                const thumbSrc = video.thumbnail ? video.thumbnail : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

                card.innerHTML = `
                    <div style="position: relative;">
                        <img src="${thumbSrc}" class="thumbnail" alt="預覽圖" loading="lazy">
                        <div class="card-play-btn"></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.name}</h3>
                        <p style="margin:0; font-size: 14px; color: #999;">${video.date}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 呼叫 Plyr 播放
        function openPlayer(fileId) {
            const modal = document.getElementById('player-modal');
            const streamUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
            
            playerInstance.source = {
                type: 'video',
                sources: [{ src: streamUrl, type: 'video/mp4' }]
            };
            
            modal.style.display = 'flex';
            playerInstance.play();
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            playerInstance.stop(); 
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
